<!DOCTYPE html>
<html lang="en" data-cgx-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GXCode Native Environment</title>
    <!-- TailwindCSS Local: Pro-Grade Build (v4) -->
    <link rel="stylesheet" href="dist/output.css">
    <link rel="stylesheet" href="index.css">
    
    <!-- Nostro Engine di Skin Ereditato -->
    <link href="patch.css" rel="stylesheet">
    <link href="lib/xterm/xterm.css" rel="stylesheet">
    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.43.0/min/vs/loader.js"></script>
    
    <!-- Fix AMD/UMD Conflict between Monaco and xterm -->
    <script>
        const originalDefine = window.define;
        window.define = undefined;
    </script>
    <script src="lib/xterm/xterm.js"></script>
    <script src="lib/xterm/addon-fit.js"></script>
    <script>
        window.define = originalDefine;
    </script>
    <style>
       ::-webkit-scrollbar { width: 6px; }
        select option {
            background-color: #0d1117 !important;
            color: #c9d1d9 !important;
        }
        
        select:focus {
            border-color: var(--accent-blue) !important;
            box-shadow: 0 0 0 1px var(--accent-blue);
        }
       ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 4px; }
       /* Custom height for Monaco container */
       #monaco-editor-container { width: 100%; height: 100%; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col antialiased bg-[var(--bg-main)] text-[var(--text-main)]">
    
    <!-- APP HEADER -->
    <header class="h-12 bg-[var(--bg-side)] border-b gx-border-theme flex items-center justify-between px-4 shrink-0 relative z-10 select-none" style="-webkit-app-region: drag;">
        <div class="flex items-center gap-3" style="-webkit-app-region: no-drag;">
            <img src="./assets/logo.png" alt="GX" class="w-7 h-7 object-contain shadow-lg rounded">
            <h1 class="font-bold tracking-widest text-gray-200 text-sm mr-4">GX<span class="text-blue-500">Code</span></h1>
            
            <!-- PANEL TOGGLES -->
            <div class="flex items-center gap-1.5 px-3 border-l border-r gx-border-theme">
                <button id="toggle-left-btn" class="p-1.5 text-gray-500 hover:text-white transition rounded-md hover:bg-white/5 active:scale-95" data-i18n="[title]panels.toggleLeft">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 3H3a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                </button>
                <button id="toggle-terminal-btn" class="p-1.5 text-gray-500 hover:text-white transition rounded-md hover:bg-white/5 active:scale-95" data-i18n="[title]panels.toggleTerminal">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 3H3a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
                </button>
                <button id="toggle-right-btn" class="p-1.5 text-gray-500 hover:text-white transition rounded-md hover:bg-white/5 active:scale-95" data-i18n="[title]panels.toggleRight">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 3H3a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                </button>
            </div>

            <div class="flex items-center gap-2 ml-2">
                 <button id="nav-market-agents" class="px-2.5 py-1 text-blue-400 hover:text-white transition text-[10px] font-bold uppercase tracking-wider" data-i18n="[title]header.marketAgents">
                    <span data-i18n="header.marketAgents">Market Agenti</span>
                 </button>
                 <button id="nav-market-skills" class="px-2.5 py-1 text-purple-400 hover:text-white transition text-[10px] font-bold uppercase tracking-wider" data-i18n="[title]header.marketSkills">
                    <span data-i18n="header.marketSkills">Market Skills</span>
                 </button>
                 <button id="nav-market-addons" class="px-2.5 py-1 text-emerald-400 hover:text-white transition text-[10px] font-bold uppercase tracking-wider" data-i18n="[title]header.marketAddons">
                    <span data-i18n="header.marketAddons">Market Addons</span>
                 </button>
            </div>
        </div>
        <div class="flex items-center gap-2" style="-webkit-app-region: no-drag;">
             <button id="nav-devtools" class="p-2 text-gray-500 hover:text-blue-400 transition rounded-full hover:bg-white/5" data-i18n="[title]header.devtools">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m10 16 1.5 1.5"/><path d="m14 8-1.5 1.5"/><path d="M15 16a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v8Z"/><path d="M18 12h-3"/><path d="M9 12H6"/><path d="M15 9h3"/><path d="M9 9H6"/><path d="M15 15h3"/><path d="M9 15H6"/></svg>
             </button>
             <button id="nav-settings" class="p-2 text-gray-500 hover:text-white transition rounded-full hover:bg-white/5" data-i18n="[title]header.settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1-2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
             </button>
             
             <!-- Window Controls -->
             <div class="flex items-center ml-2 border-l gx-border-theme pl-2">
                 <button id="win-min" class="p-2 text-gray-500 hover:text-white hover:bg-white/5 transition rounded">
                     <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                 </button>
                 <button id="win-max" class="p-2 text-gray-500 hover:text-white hover:bg-white/5 transition rounded">
                     <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
                 </button>
                 <button id="win-close" class="p-2 text-gray-500 hover:text-white hover:bg-red-600 transition rounded">
                     <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                 </button>
             </div>
        </div>
    </header>

    <!-- ACTIVITY BAR & SIDEBAR FLEX CONTAINER -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- ACTIVITY BAR -->
        <nav id="activity-bar" class="w-12 bg-[var(--bg-side)] border-r border-[var(--border-dim)] flex flex-col items-center py-4 shrink-0 gap-4 z-20">
            <button id="activity-explorer" class="nav-btn p-2.5 text-blue-500 hover:text-white transition rounded-md" data-i18n="[title]sidebar.explorer">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            </button>
            <button id="activity-search" class="nav-btn p-2.5 text-gray-500 hover:text-white transition rounded-md" data-i18n="[title]sidebar.search">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
            <button id="activity-git" class="nav-btn p-2.5 text-gray-500 hover:text-white transition rounded-md" data-i18n="[title]sidebar.git">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v8"/><path d="m16 6-4 4-4-4"/><circle cx="12" cy="18" r="3"/></svg>
            </button>
            <button id="activity-debug" class="nav-btn p-2.5 text-gray-500 hover:text-white transition rounded-md" data-i18n="[title]sidebar.debug">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m7 4 5 2 5-2v11l-5 2-5-2V4Z"/><path d="M15.5 10.5 12 14l-3.5-3.5"/></svg>
            </button>
            <button id="activity-testing" class="nav-btn p-2.5 text-gray-500 hover:text-white transition rounded-md" data-i18n="[title]sidebar.testing">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 14h18"/><path d="m7 18 2 2 4-4"/><path d="m7 10 2 2 4-4"/><path d="m7 2 2 2 4-4"/></svg>
            </button>
        </nav>

        <!-- LEFT SIDEBAR -->
        <aside id="left-sidebar" class="w-64 bg-[var(--bg-side)] border-r gx-border-theme flex flex-col shrink-0 transition-all z-40 overflow-hidden relative">
            
            <div id="sidebar-primary-section" class="flex-1 flex flex-col overflow-hidden">
                <div class="unified-header flex gap-0.5 !p-1 bg-[var(--bg-side)] shrink-0 border-b gx-border-theme relative z-[100]">
                    <button id="left-tab-explorer" class="evolution-tab-btn flex-1 active !rounded-lg" data-i18n="sidebar.files">Files</button>
                    <button id="left-tab-issues" class="evolution-tab-btn flex-1 !rounded-lg" data-i18n="sidebar.issues">Issue</button>
                </div>
                
                <div class="flex-1 overflow-hidden relative flex flex-col bg-[var(--bg-side)]">
                    <div id="pane-explorer" class="flex-1 flex flex-col overflow-hidden">
                         <div class="unified-header flex justify-between items-center shrink-0 px-4">
                              <span class="explorer-header-label">Progetto Locale</span>
                              <div class="flex items-center gap-0.5">
                                  <button id="explorer-new-file" class="explorer-action-btn" title="Nuovo File">
                                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                                  </button>
                                  <button id="explorer-new-folder" class="explorer-action-btn" title="Nuova Cartella">
                                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                                  </button>
                                  <div class="relative">
                                      <button id="btn-open-dropdown" class="explorer-action-btn active-breath" title="Apri Risorsa">
                                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><path d="m6 9 6 6 6-6" stroke-width="2"/></svg>
                                      </button>
                                      <div id="open-dropdown-menu" class="hidden absolute right-0 top-full mt-2 w-48 gx-bg-side border gx-border-theme rounded-xl shadow-2xl z-50 overflow-hidden py-1.5 backdrop-blur-xl">
                                          <button id="opt-open-folder" class="w-full text-left px-4 py-2 text-[10px] text-gray-300 hover:bg-blue-600 hover:text-white transition flex items-center gap-2">
                                              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                                              <span>Apri Cartella</span>
                                          </button>
                                          <button id="opt-open-file" class="w-full text-left px-4 py-2 text-[10px] text-gray-300 hover:bg-blue-600 hover:text-white transition flex items-center gap-2">
                                              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                                              <span>Apri File</span>
                                          </button>
                                          <button id="opt-open-workspace" class="w-full text-left px-4 py-2 text-[10px] text-gray-300 hover:bg-blue-600 hover:text-white transition flex items-center gap-2 border-t border-[var(--border-ghost)]">
                                              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                                              <span>Apri Workspace</span>
                                          </button>
                                      </div>
                                  </div>
                              </div>
                         </div>
                         <div id="workspace-tree-container" class="flex-1 overflow-y-auto custom-scrollbar p-1"></div>
                    </div>
                    
                    <div id="pane-issues" class="hidden flex flex-col bg-[var(--bg-side)] h-full">
                         <div class="unified-header flex justify-between items-center shrink-0">
                             <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pl-1">Issues</h3>
                         </div>
                         <div id="issues-content" class="flex-1 overflow-y-auto p-2 space-y-2 custom-scrollbar"></div>
                    </div>
                </div>
            </div>

            <div id="sidebar-drag-bar" class="h-[1px] gx-divide-theme hover:h-1 hover:bg-blue-500 cursor-row-resize transition-all shrink-0 z-50 hidden"></div>

            <div id="sidebar-secondary-section" class="h-0 flex flex-col overflow-hidden bg-[var(--bg-side-alt)] border-t gx-border-theme transition-all">
                <div id="pane-search" class="hidden flex flex-col h-full overflow-hidden p-4">
                    <h3 class="text-[9px] font-black text-gray-500 uppercase tracking-[0.3em] mb-4">Search</h3>
                    <input type="text" id="global-search-input" placeholder="Search..." class="w-full bg-[var(--bg-side)] border gx-border-theme rounded-lg px-4 py-2 text-xs text-gray-200 outline-none">
                    <div id="global-search-results" class="flex-1 overflow-y-auto mt-4 custom-scrollbar"></div>
                </div>
                <div id="pane-git" class="hidden flex flex-col h-full overflow-hidden">
                    <div class="p-3 border-b gx-border-theme flex justify-between items-center"><h3 class="text-[9px] font-black text-gray-500 uppercase tracking-[0.3em]">Git</h3></div>
                    <div id="git-content" class="flex-1 overflow-y-auto custom-scrollbar p-3"></div>
                </div>
                <div id="pane-debug" class="hidden flex flex-col h-full overflow-hidden"></div>
                <div id="pane-testing" class="hidden flex flex-col h-full overflow-hidden px-4 py-5">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex flex-col">
                            <span class="text-[7px] text-gray-600 font-black uppercase tracking-[0.3em] mb-0.5">Workspace</span>
                            <h3 class="text-[10px] font-black text-white uppercase tracking-[0.2em] italic">Test <span class="text-blue-500">Explorer</span></h3>
                        </div>
                        <div class="flex items-center gap-1 bg-white/5 p-1 rounded-xl border border-white/5">
                            <button id="btn-scan-tests" class="p-2 rounded-lg hover:bg-white/5 text-gray-500 hover:text-blue-400 transition-all active:scale-90" title="Scansiona Workspace">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1.05 6.63 2.9L21 8"/><path d="M21 3v5h-5"/></svg>
                            </button>
                            <div class="w-[1px] h-3 bg-white/10 mx-0.5"></div>
                            <button id="btn-run-all-tests" class="p-2 rounded-lg hover:bg-white/5 text-gray-500 hover:text-emerald-400 transition-all active:scale-90" title="Esegui Tutti i Test">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 3 14 9-14 9V3z"/></svg>
                            </button>
                        </div>
                    </div>
                    <div id="test-tree-root" class="flex-1 overflow-y-auto custom-scrollbar pr-1"></div>
                </div>
            </div>
        </aside>

        <!-- CENTER WORKSPACE -->
        <main class="flex-1 flex flex-col bg-[var(--bg-main)] relative min-w-0">
            <div id="main-canvas" class="flex-1 overflow-y-auto scroll-smooth flex flex-col no-scrollbar">
                
                <!-- WORKSPACE TABS -->
                <div class="unified-header flex gap-2 overflow-hidden px-3">
                    <div id="workspace-tabs-container" class="flex-1 flex items-center overflow-hidden h-full">
                        <div id="workspace-tabs" class="flex space-x-1 overflow-x-auto overflow-y-hidden flex-1 scroll-smooth"></div>
                        <div class="tab-controls flex gap-0.5 items-center px-1">
                             <div class="tab-control-btn p-1.5 text-gray-500 hover:text-blue-400 cursor-pointer transition-colors" title="Split Left" onclick="window.setSplitMode('vertical-left')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                             </div>
                             <div class="tab-control-btn p-1.5 text-gray-500 hover:text-blue-400 cursor-pointer transition-colors" title="Split Right" onclick="window.setSplitMode('vertical-right')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                             </div>
                             <div class="tab-control-btn p-1.5 text-gray-500 hover:text-blue-400 cursor-pointer transition-colors" title="Split Bottom" onclick="window.setSplitMode('horizontal-bottom')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
                             </div>
                             <div class="h-4 w-[1px] gx-divide-theme mx-1"></div>
                             <div class="tab-control-btn p-1.5 text-gray-500 hover:text-red-400 cursor-pointer transition-colors" title="Chiudi Tutto" onclick="window.closeAllFiles()">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                             </div>
                        </div>
                    </div>
                </div>

                <!-- EDITOR CONTENT -->
                <div id="editor-breadcrumbs" class="h-8 bg-[var(--bg-side)] border-b gx-border-theme flex items-center px-4 overflow-x-auto no-scrollbar gap-2 shrink-0 hidden transition-all"></div>

                <div id="hub-content-area" class="flex-1 flex flex-col relative overflow-hidden bg-[var(--bg-main)] min-h-0 min-w-0">
                    <div id="monaco-editor-container" class="flex-1 h-full hidden min-w-0 min-h-0 bg-[var(--bg-main)]"></div>
                    <div id="editor-split-drag-bar" class="w-[1.5px] gx-divide-theme hover:bg-blue-500 cursor-col-resize shrink-0 hidden z-50"></div>
                    <div id="monaco-editor-container-right" class="flex-1 h-full hidden border-l gx-border-theme min-w-0 min-h-0 bg-[var(--bg-main)]"></div>
                    
                    <div id="hub-placeholder" class="w-full h-full flex flex-col items-center justify-center">
                        <div class="max-w-2xl text-center text-gray-400 space-y-4 px-4">
                            <div class="inline-flex items-center justify-center w-24 h-24 mb-6 relative">
                                <div class="absolute inset-0 bg-blue-500/10 blur-2xl rounded-full animate-pulse-slow"></div>
                                <svg viewBox="0 0 100 100" class="w-20 h-20 relative z-10" fill="none">
                                    <path d="M50 10 L90 30 L90 70 L50 90 L10 70 L10 30 Z" stroke="currentColor" stroke-width="2" class="text-blue-500/20"/>
                                    <path d="M50 20 L80 35 L80 65 L50 80 L20 65 L20 35 Z" stroke="currentColor" stroke-width="3" class="text-blue-500"/>
                                    <path d="M40 40 L30 50 L40 60" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"/>
                                    <path d="M55 35 L45 65" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="text-gray-600"/>
                                </svg>
                            </div>
                            <h2 class="text-4xl font-black text-white tracking-tighter uppercase italic">GX<span class="text-blue-500">CODE</span> STUDIO</h2>
                            <p class="text-[13px] text-gray-500 max-w-sm mx-auto font-medium">Vision 2026 Elite Edition • Progettato per l'eccellenza.</p>
                            <div class="pt-8"><div class="px-4 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 inline-block uppercase text-[8px] text-blue-400 font-black tracking-[0.4em]">GX-ENGINE v4.0 NEURAL</div></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BOTTOM PANEL -->
            <div id="terminal-drag-bar" class="h-[1.5px] gx-divide-theme hover:bg-blue-500 cursor-row-resize shrink-0 transition"></div>
            <div id="bottom-panel" class="h-[40%] min-h-[36px] bg-[var(--bg-main)] shrink-0 flex flex-col transition-all duration-300 border-t gx-border-theme relative z-10 overflow-hidden">
                <div id="bottom-panel-header" class="unified-header flex justify-between items-center shrink-0">
                    <div class="flex items-center h-full gap-1 p-1">
                        <button id="tab-terminal-btn" class="evolution-tab-btn h-full px-4 active">Terminale</button>
                        <button id="tab-problems-btn" class="evolution-tab-btn h-full px-4">Problemi</button>
                        <button id="tab-output-btn" class="evolution-tab-btn h-full px-4">Output</button>
                        <button id="tab-debug-console-btn" class="evolution-tab-btn h-full px-4">Debug</button>
                    </div>
                    <div class="flex items-center h-full gap-2 pr-2">
                        <button id="tab-ollama-btn" class="evolution-pill-btn text-emerald-400">GX AI</button>
                        <button id="tab-gemini-btn" class="evolution-pill-btn text-blue-400">Gemini</button>
                        <button id="tab-claude-btn" class="evolution-pill-btn text-orange-400">Claude</button>
                        <div class="h-4 w-[1px] gx-divide-theme mx-1"></div>
                        <button id="close-panel-btn" class="p-1.5 text-gray-500 hover:text-white transition-all rounded-lg hover:bg-white/5"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m18 15-6-6-6 6"/></svg></button>
                    </div>
                </div>
                <div id="bottom-panes-root" class="flex-1 w-full relative overflow-hidden bg-[var(--bg-main)]">
                    <div id="pane-terminal" class="absolute inset-0 flex flex-col"></div>
                    <div id="pane-problems" class="absolute inset-0 hidden flex flex-col p-4 overflow-y-auto custom-scrollbar"></div>
                    <div id="pane-output" class="absolute inset-0 hidden flex flex-col p-4 font-mono text-xs text-gray-400 overflow-y-auto custom-scrollbar"></div>
                    <div id="pane-debug-console" class="absolute inset-0 hidden flex flex-col p-4 font-mono text-xs text-gray-400 overflow-y-auto custom-scrollbar"></div>
                    <div id="pane-ports" class="absolute inset-0 hidden flex flex-col p-4"></div>
                    <div id="pane-agent" class="absolute inset-0 hidden flex flex-col"></div>
                    <div id="pane-ollama" class="absolute inset-0 hidden flex flex-col"></div>
                    <div id="pane-ai-claude" class="absolute inset-0 hidden flex flex-col overflow-hidden"><div id="pane-claude-cli" class="flex-1 w-full p-2"></div></div>
                    <div id="pane-ai-custom" class="absolute inset-0 hidden flex flex-col"></div>
                </div>
            </div>
        </main>

        <aside id="right-sidebar" class="w-80 bg-[var(--bg-side)] border-l gx-border-theme flex flex-col shrink-0 transition-all z-10 overflow-hidden relative">
            <!-- Sidebar Tabs -->
            <div class="unified-header flex p-1.5 gap-1 shrink-0 bg-[var(--bg-side)]">
                <button id="sidebar-tab-agents" class="evolution-tab-btn flex-1 active">Agents</button>
                <button id="sidebar-tab-skills" class="evolution-tab-btn flex-1">Skills</button>
                <button id="sidebar-tab-ai-companion" class="evolution-tab-btn flex-1">Companion</button>
            </div>

            <!-- Unified Toolbar Header -->
            <div class="flex flex-col gap-3 p-4 border-b gx-border-theme bg-gradient-to-b from-[var(--border-ghost)] to-transparent">
                <div class="flex justify-between items-center px-1">
                    <div class="flex items-center gap-4">
                        <div class="flex flex-col"><span class="text-[7px] text-gray-600 font-black uppercase tracking-[0.3em]">Priority</span><span class="text-blue-500 font-black text-[9px] tracking-widest">ELITE</span></div>
                        <div class="h-4 w-[1px] bg-[var(--border-ghost)]"></div>
                        <div class="flex flex-col"><span class="text-[7px] text-gray-600 font-black uppercase tracking-[0.3em]">Status</span><span class="text-emerald-500 font-black text-[9px] tracking-widest">STABLE</span></div>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <div class="relative flex-1 group">
                        <input type="text" id="sidebar-search" placeholder="Cerca..." class="w-full bg-[var(--bg-side-alt)] border gx-border-theme rounded-xl pr-4 py-2 text-[11px] text-gray-300 outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/20 transition-all font-medium" style="padding-left: 45px !important;">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="absolute top-2.5 text-gray-600 transition-colors group-focus-within:text-blue-500" style="left: 18px !important;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </div>
                    <button data-action="create-new" class="w-9 h-9 flex items-center justify-center bg-blue-500/10 text-blue-400 hover:bg-blue-500 hover:text-white rounded-xl border border-blue-500/20 transition-all active:scale-90" title="Nuovo">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="14" y2="12"/></svg>
                    </button>
                    <div id="skill-categories" class="hidden">
                         <button id="skill-filter-btn" class="p-2 text-gray-500 hover:text-emerald-400 transition" title="Filtra Categoria">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
                         </button>
                    </div>
                </div>
            </div>

            <!-- Content Area Explorer -->
            <div id="sidebar-content" class="flex-1 overflow-y-auto p-3 flex flex-col gap-2 custom-scrollbar"></div>
        </aside>

    </div>

    <div id="settings-root" class="fixed inset-0 pointer-events-none" style="z-index: 1000000;"></div>
    <div id="modals-root" class="fixed inset-0 pointer-events-none" style="z-index: 1001000;"></div>
    <div id="crud-root" class="fixed inset-0 pointer-events-none" style="z-index: 1002000;"></div>
    <div id="dialogs-root" class="fixed inset-0 pointer-events-none" style="z-index: 2000000;"></div>
    
    <script type="module" src="scripts/app.js"></script>
</body>
</html>
